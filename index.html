<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ship Shooter - Shivansh's Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1628;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 100, 200, 0.3);
        }
    </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(function() {
    'use strict';
    
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    canvas.width = 800;
    canvas.height = 720;
    
    const W = canvas.width;
    const H = canvas.height;
    
    // Game constants
    const PLAYER_SPEED = 4;
    const BULLET_SPEED = 14;
    const TURRET_BULLET_SPEED = 10;
    const ENEMY_BULLET_SPEED = 7;
    const SHIP_SPEED = 1.5;
    const MAX_ROCK = 0.05;
    const ROCK_DAMP = 0.94;
    
    // Game state
    let gameState = 'title';
    let score = 0;
    let highScore = parseInt(localStorage.getItem('shipShooterHS')) || 0;
    let combo = 0, comboTimer = 0;
    let difficulty = 1, gameTime = 0;
    let scrollY = 0, shipRock = { angle: 0, vel: 0 };
    let screenShake = 0;
    let soundEnabled = true;
    
    // ==================== ADAPTIVE DIFFICULTY DIRECTOR ====================
    const DIFFICULTY_STATS_WINDOW = 30000; // 30 seconds rolling window
    const DIFFICULTY_SMOOTHING = 0.05;
    
    let difficultyDirector = {
        // Rolling stats
        shotsFired: 0,
        shotsHit: 0,
        damageTaken: 0,
        kills: 0,
        scoreGained: 0,
        lastKillTime: 0,
        currentCombo: 0,
        maxComboThisWindow: 0,
        windowStartTime: 0,
        
        // Current pressure (0-1): 0 = too hard, 1 = too easy
        pressure: 0.5,
        
        // Current spawn config based on pressure
        spawnInterval: 100,
        enemyDensity: 1,
        enemyHealth: 2,
        enemyFireRate: 0.5,
        enemySpeed: 1,
        
        reset: function() {
            this.shotsFired = 0;
            this.shotsHit = 0;
            this.damageTaken = 0;
            this.kills = 0;
            this.scoreGained = 0;
            this.lastKillTime = 0;
            this.currentCombo = 0;
            this.maxComboThisWindow = 0;
            this.windowStartTime = Date.now();
            this.pressure = 0.5;
        },
        
        recordShot: function() {
            this.shotsFired++;
        },
        
        recordHit: function() {
            this.shotsHit++;
        },
        
        recordDamage: function(amount) {
            this.damageTaken += amount;
        },
        
        recordKill: function() {
            const now = Date.now();
            if (now - this.lastKillTime < 1000) {
                this.currentCombo++;
            } else {
                this.currentCombo = 1;
            }
            this.lastKillTime = now;
            this.kills++;
            if (this.currentCombo > this.maxComboThisWindow) {
                this.maxComboThisWindow = this.currentCombo;
            }
        },
        
        recordScore: function(points) {
            this.scoreGained += points;
        },
        
        update: function() {
            const now = Date.now();
            const elapsed = now - this.windowStartTime;
            
            // Reset window if 30 seconds passed
            if (elapsed >= DIFFICULTY_STATS_WINDOW) {
                this.shotsFired = 0;
                this.shotsHit = 0;
                this.damageTaken = 0;
                this.kills = 0;
                this.scoreGained = 0;
                this.currentCombo = 0;
                this.maxComboThisWindow = 0;
                this.windowStartTime = now;
            }
            
            // Calculate raw pressure
            const rawPressure = this.calculateRawPressure();
            
            // Apply exponential smoothing
            this.pressure = DIFFICULTY_SMOOTHING * rawPressure + (1 - DIFFICULTY_SMOOTHING) * this.pressure;
            this.pressure = Math.max(0, Math.min(1, this.pressure));
            
            // Update spawn config
            this.updateSpawnConfig();
        },
        
        calculateRawPressure: function() {
            const elapsedSec = Math.max(0.1, (Date.now() - this.windowStartTime) / 1000);
            
            // Accuracy score (higher = better player)
            let accuracyScore = 0;
            if (this.shotsFired > 0) {
                accuracyScore = Math.min(1, this.shotsHit / this.shotsFired);
            }
            
            // Damage taken rate (lower = better)
            const damageRate = this.damageTaken / elapsedSec;
            const damageScore = Math.max(0, Math.min(1, 1 - damageRate / 10));
            
            // Combo score (higher = better)
            const comboScore = Math.min(1, this.maxComboThisWindow / 5);
            
            // Score velocity (higher = better)
            const scoreVelocity = this.scoreGained / elapsedSec;
            const scoreScore = Math.min(1, scoreVelocity / 50);
            
            // Weighted combination
            return accuracyScore * 0.35 + damageScore * 0.25 + comboScore * 0.25 + scoreScore * 0.15;
        },
        
        updateSpawnConfig: function() {
            // Easy config (pressure = 0): Player struggling
            // Hard config (pressure = 1): Player dominating
            const p = this.pressure;
            
            // Interpolate spawn interval (easy = longer gaps)
            this.spawnInterval = Math.round(150 - p * 100); // 150 at p=0, 50 at p=1
            
            // Interpolate enemy density (easy = fewer)
            this.enemyDensity = Math.max(1, Math.round(1 + p * 2));
            
            // Interpolate enemy health (easy = weaker)
            this.enemyHealth = Math.max(1, Math.round(2 - p * 1));
            
            // Interpolate fire rate (easy = slower)
            this.enemyFireRate = 0.3 + p * 0.4; // 0.3 at p=0, 0.7 at p=1
            
            // Interpolate enemy speed (easy = slower)
            this.enemySpeed = 0.7 + p * 0.6; // 0.7 at p=0, 1.3 at p=1
        },
        
        getPressureColor: function() {
            const p = this.pressure;
            if (p < 0.5) {
                const t = p / 0.5;
                return `rgb(${Math.round(100 + 155 * t)}, ${Math.round(100 + 155 * t)}, 255)`;
            } else {
                const t = (p - 0.5) / 0.5;
                return `rgb(255, ${Math.round(255 - 155 * t)}, ${Math.round(255 - 155 * t)})`;
            }
        }
    };
    
    // ==================== LEADERBOARD SYSTEM ====================
    let playerName = 'Player';
    
    function getLeaderboard() {
        const data = localStorage.getItem('shipShooterLeaderboard');
        return data ? JSON.parse(data) : [];
    }
    
    function saveScoreToLeaderboard(name, score, timestamp) {
        const leaderboard = getLeaderboard();
        leaderboard.push({ name, score, timestamp });
        leaderboard.sort((a, b) => b.score - a.score);
        leaderboard.splice(10); // Keep only top 10
        localStorage.setItem('shipShooterLeaderboard', JSON.stringify(leaderboard));
    }
    
    function setPlayerName(name) {
        playerName = name.trim().substring(0, 12) || 'Player';
    }
    
    // ==================== SOUND SYSTEM ====================
    let audioCtx = null;
    
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }
    
    function playSound(type) {
        if (!soundEnabled || !audioCtx) return;
        
        const now = audioCtx.currentTime;
        
        switch(type) {
            case 'shoot':
                // Default pistol shot
                playNoiseBlast(0.1, 0.3, 800, 200);
                break;
            case 'ak47':
                // Rapid machine gun
                playNoiseBlast(0.05, 0.15, 1200, 400);
                break;
            case 'laser':
                // Sci-fi laser
                playLaserSound(0.15, 0.2, 2000, 500);
                break;
            case 'rocket':
                // Rocket launch whoosh
                playRocketSound(0.2, 0.3, 300, 100);
                break;
            case 'explosion':
                // Big explosion
                playExplosionSound(0.3, 0.5, 100, 50);
                break;
            case 'pickup':
                // Powerup collection
                playPickupSound(0.1, 0.3, 600, 1200);
                break;
            case 'hit':
                // Player damage
                playHitSound(0.2, 0.3, 200, 80);
                break;
            case 'emp':
                // EMP blast
                playEMPSound(0.5, 0.8, 100, 3000);
                break;
            case 'turret':
                // Turret shot
                playNoiseBlast(0.08, 0.2, 1500, 600);
                break;
            case 'click':
                // UI click
                playClickSound(0.05, 0.1, 800);
                break;
            case 'gameover':
                // Game over jingle
                playGameOverSound();
                break;
        }
    }
    
    function playNoiseBlast(duration, volume, freqStart, freqEnd) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        // White noise
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freqStart, now);
        osc.frequency.exponentialRampToValueAtTime(freqEnd, now + duration);
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(freqStart * 2, now);
        filter.frequency.exponentialRampToValueAtTime(freqEnd, now + duration);
        
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(now);
        osc.stop(now + duration);
    }
    
    function playLaserSound(duration, volume, freqStart, freqEnd) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freqStart, now);
        osc.frequency.exponentialRampToValueAtTime(freqEnd, now + duration);
        
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(now);
        osc.stop(now + duration);
    }
    
    function playRocketSound(duration, volume, freqStart, freqEnd) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(freqStart, now);
        osc.frequency.linearRampToValueAtTime(freqEnd, now + duration);
        
        osc2.type = 'square';
        osc2.frequency.setValueAtTime(freqStart * 1.5, now);
        osc2.frequency.linearRampToValueAtTime(freqEnd * 1.5, now + duration);
        
        gain.gain.setValueAtTime(volume * 0.5, now);
        gain.gain.linearRampToValueAtTime(volume, now + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        
        osc.connect(gain);
        osc2.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(now);
        osc2.start(now);
        osc.stop(now + duration);
        osc2.stop(now + duration);
    }
    
    function playExplosionSound(duration, volume, freqStart, freqEnd) {
        const now = audioCtx.currentTime;
        
        // Low rumble
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freqStart, now);
        osc.frequency.exponentialRampToValueAtTime(freqEnd, now + duration);
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(500, now);
        filter.frequency.exponentialRampToValueAtTime(50, now + duration);
        
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(now);
        osc.stop(now + duration);
        
        // Noise burst
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
        }
        
        const noise = audioCtx.createBufferSource();
        const noiseGain = audioCtx.createGain();
        const noiseFilter = audioCtx.createBiquadFilter();
        
        noise.buffer = buffer;
        noiseFilter.type = 'lowpass';
        noiseFilter.frequency.setValueAtTime(1000, now);
        noiseFilter.frequency.exponentialRampToValueAtTime(100, now + duration);
        
        noiseGain.gain.setValueAtTime(volume * 0.5, now);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        
        noise.connect(noiseFilter);
        noiseFilter.connect(noiseGain);
        noiseGain.connect(audioCtx.destination);
        
        noise.start(now);
    }
    
    function playPickupSound(duration, volume, freqStart, freqEnd) {
        const now = audioCtx.currentTime;
        
        // Rising arpeggio
        const notes = [freqStart, freqStart * 1.25, freqStart * 1.5, freqEnd];
        const noteDuration = duration / notes.length;
        
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + i * noteDuration);
            
            gain.gain.setValueAtTime(0, now + i * noteDuration);
            gain.gain.linearRampToValueAtTime(volume, now + i * noteDuration + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, now + (i + 1) * noteDuration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(now + i * noteDuration);
            osc.stop(now + (i + 1) * noteDuration);
        });
    }
    
    function playHitSound(duration, volume, freqStart, freqEnd) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(freqStart, now);
        osc.frequency.exponentialRampToValueAtTime(freqEnd, now + duration);
        
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(now);
        osc.stop(now + duration);
    }
    
    function playEMPSound(duration, volume, freqStart, freqEnd) {
        const now = audioCtx.currentTime;
        
        // Expanding ring with蜂鸣
        for (let i = 0; i < 3; i++) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            const startFreq = freqStart + i * 200;
            osc.frequency.setValueAtTime(startFreq, now + i * 0.1);
            osc.frequency.linearRampToValueAtTime(freqEnd + i * 200, now + duration);
            
            gain.gain.setValueAtTime(0, now + i * 0.1);
            gain.gain.linearRampToValueAtTime(volume / (i + 1), now + i * 0.1 + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(now + i * 0.1);
            osc.stop(now + duration);
        }
    }
    
    function playClickSound(duration, volume, freq) {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        
        gain.gain.setValueAtTime(volume, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.start(now);
        osc.stop(now + duration);
    }
    
    function playGameOverSound() {
        const now = audioCtx.currentTime;
        const notes = [400, 350, 300, 200];
        const noteDuration = 0.2;
        
        notes.forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, now + i * noteDuration);
            
            gain.gain.setValueAtTime(0, now + i * noteDuration);
            gain.gain.linearRampToValueAtTime(0.3, now + i * noteDuration + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, now + (i + 1) * noteDuration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start(now + i * noteDuration);
            osc.stop(now + (i + 1) * noteDuration);
        });
    }
    
    // Player
    const player = {
        x: W / 2, y: H * 0.68,
        health: 3, maxHealth: 3,
        invincible: 0, fireCD: 0,
        weapon: 'default', // default, ak47, rocket, laser, emp
        weaponTimer: 0,
        rockets: 0
    };
    
    // Arrays
    let bullets = [], enemyBullets = [], turretBullets = [], rockets = [];
    let enemies = [], particles = [], containers = [], sharks = [], rocks = [], weaponPickups = [];
    
    // Input
    const keys = {};
    const mouse = { x: 0, y: 0 };
    canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
    });
    window.addEventListener('keydown', e => { 
        keys[e.key.toLowerCase()] = true; 
        e.preventDefault();
        if (e.key.toLowerCase() === 'm') {
            soundEnabled = !soundEnabled;
        }
    });
    window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    canvas.addEventListener('click', handleClick);
    
    // Name entry keyboard handling
    window.addEventListener('keydown', e => {
        if (gameState === 'title') {
            if (e.key === 'Backspace') {
                playerName = playerName.slice(0, -1);
            } else if (e.key.length === 1 && playerName.length < 12) {
                playerName += e.key.toUpperCase();
            } else if (e.key === 'Enter') {
                gameState = 'playing';
                startGame();
            }
        }
    });
    
    function handleClick() {
        initAudio();
        playSound('click');
        
        if (gameState === 'title') {
            // Check START button
            if (mouseInRect(W/2 - 70, 350, 140, 50)) {
                gameState = 'playing';
                startGame();
            }
            // Check SCORES button
            if (mouseInRect(W/2 - 70, 410, 140, 40)) {
                gameState = 'leaderboard';
            }
        } else if (gameState === 'gameover') {
            startGame();
        } else if (gameState === 'leaderboard') {
            // Check BACK button
            if (mouseInRect(W/2 - 60, 620, 120, 45)) {
                gameState = 'title';
            }
        }
    }
    
    function mouseInRect(x, y, w, h) {
        return mouse.x >= x && mouse.x <= x + w && mouse.y >= y && mouse.y <= y + h;
    }
    
    function drawBackground() {
        // Ocean gradient
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#003554');
        grad.addColorStop(0.5, '#005f8a');
        grad.addColorStop(1, '#0077b6');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
        
        // Animated waves
        ctx.strokeStyle = 'rgba(0, 180, 220, 0.12)';
        ctx.lineWidth = 2;
        for (let i = 0; i < 20; i++) {
            ctx.beginPath();
            const baseY = ((i * 55 + scrollY * 0.4) % (H + 80)) - 40;
            for (let x = 0; x <= W; x += 8) {
                const wy = baseY + Math.sin((x + scrollY * 2) * 0.025) * 6;
                if (x === 0) ctx.moveTo(x, wy); else ctx.lineTo(x, wy);
            }
            ctx.stroke();
        }
    }
    
    function drawShip() {
        ctx.save();
        ctx.translate(W / 2, H * 0.54);
        ctx.rotate(shipRock.angle);
        ctx.translate(-W / 2, -H * 0.54);
        
        const dw = W * 0.65, dh = H * 0.42;
        const dx = (W - dw) / 2, dy = H * 0.34;
        
        // Hull shadow
        ctx.fillStyle = 'rgba(0,0,0,0.25)';
        ctx.beginPath();
        ctx.ellipse(W / 2 + 6, dy + dh + 12, dw * 0.48, dh * 0.35, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Hull
        ctx.fillStyle = '#2c3e50';
        ctx.beginPath();
        ctx.moveTo(dx - 20, dy + dh);
        ctx.lineTo(dx, dy + dh + 30);
        ctx.lineTo(dx + dw, dy + dh + 30);
        ctx.lineTo(dx + dw + 20, dy + dh);
        ctx.lineTo(dx + dw + 15, dy + dh - 15);
        ctx.lineTo(dx - 15, dy + dh - 15);
        ctx.closePath();
        ctx.fill();
        
        // Hull stripe
        ctx.fillStyle = '#e74c3c';
        ctx.fillRect(dx - 8, dy + dh + 8, dw + 16, 10);
        
        // Deck
        ctx.fillStyle = '#5d6d7e';
        roundRect(dx, dy, dw, dh, 6);
        ctx.fill();
        ctx.strokeStyle = '#f39c12';
        ctx.lineWidth = 4;
        roundRect(dx, dy, dw, dh, 6);
        ctx.stroke();
        
        // Deck planks
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 1;
        for (let i = 1; i < 8; i++) {
            ctx.beginPath();
            ctx.moveTo(dx, dy + i * dh / 8);
            ctx.lineTo(dx + dw, dy + i * dh / 8);
            ctx.stroke();
        }
        
        ctx.restore();
    }
    
    function roundRect(x, y, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.lineTo(x + w - r, y);
        ctx.quadraticCurveTo(x + w, y, x + w, y + r);
        ctx.lineTo(x + w, y + h - r);
        ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        ctx.lineTo(x + r, y + h);
        ctx.quadraticCurveTo(x, y + h, x, y + h - r);
        ctx.lineTo(x, y + r);
        ctx.quadraticCurveTo(x, y, x + r, y);
        ctx.closePath();
    }
    
    function drawContainers() {
        ctx.save();
        ctx.translate(W / 2, H * 0.54);
        ctx.rotate(shipRock.angle);
        ctx.translate(-W / 2, -H * 0.54);
        
        const dw = W * 0.65, dh = H * 0.42;
        const dx = (W - dw) / 2, dy = H * 0.34;
        
        const palette = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22', '#34495e', '#e91e63', '#00bcd4', '#8bc34a', '#ff5722', '#795548', '#9c27b0', '#607d8b'];
        
        const defs = [
            { x: dx + 18, y: dy + 8, w: 58, h: 38 },
            { x: dx + 86, y: dy + 8, w: 68, h: 38 },
            { x: dx + 164, y: dy + 8, w: 52, h: 38 },
            { x: dx + 226, y: dy + 8, w: 62, h: 38 },
            { x: dx + 8, y: dy + 54, w: 78, h: 42 },
            { x: dx + 96, y: dy + 54, w: 48, h: 42 },
            { x: dx + 154, y: dy + 54, w: 72, h: 42 },
            { x: dx + 236, y: dy + 54, w: 58, h: 42 },
            { x: dx + 28, y: dy + 104, w: 62, h: 38 },
            { x: dx + 100, y: dy + 104, w: 68, h: 38 },

    function drawRocks() {

        ctx.bezierCurveTo(x - size / 2, y + size / 2, x, y + size * 0.75, x, y + size);
        ctx.bezierCurveTo(x, y + size * 0.75, x + size / 2, y + size / 2, x + size / 2, y + size * 0.25);
        ctx.bezierCurveTo(x + size / 2, y, x, y, x, y + size * 0.25);
        ctx.fill();
    }

    function spawnHelicopter() {
        const d = difficultyDirector;
        const side = Math.random();
        let x, y, vx, vy;
        
        if (side < 0.4) {
            x = 50 + Math.random() * (W - 100);
            y = -60;
            vx = (Math.random() - 0.5) * 1.5 * d.enemySpeed;
            vy = (1 + Math.random() * 1.5) * d.enemySpeed;
        } else if (side < 0.7) {
            x = -50;
            y = 40 + Math.random() * 180;
            vx = (1.8 + Math.random() * 1.5) * d.enemySpeed;
            vy = (0.5 + Math.random()) * d.enemySpeed;
        } else {
            x = W + 50;
            y = 40 + Math.random() * 180;
            vx = -(1.8 + Math.random() * 1.5) * d.enemySpeed;
            vy = (0.5 + Math.random()) * d.enemySpeed;
        }
        
        enemies.push({ 
            x, y, vx, vy, 
            health: d.enemyHealth, 
            fireTimer: Math.round((60 + Math.random() * 60) / d.enemyFireRate) 
        });
    }
    
    function shoot() {
        if (player.fireCD > 0) return;
        
        // Handle different weapons
        if (player.weapon === 'ak47') {
            // Rapid burst, accurate
            player.fireCD = 3;
            bullets.push({ x: player.x, y: player.y - 25, vx: 0, vy: -BULLET_SPEED * 1.5, type: 'ak47' });
            spawnParticle(player.x, player.y - 28, (Math.random() - 0.5) * 2, -Math.random() * 3, '#ffaa00', 5);
            playSound('ak47');
            difficultyDirector.recordShot();
        } else if (player.weapon === 'rocket') {
            if (player.rockets > 0) {
                player.fireCD = 30;
                player.rockets--;
                // Homing rocket - find nearest enemy
                let nearest = null, nearestDist = Infinity;
                enemies.forEach(e => {
                    const d = Math.hypot(e.x - player.x, e.y - player.y);
                    if (d < nearestDist) { nearestDist = d; nearest = e; }
                });
                rockets.push({
                    x: player.x, y: player.y - 25,
                    target: nearest,
                    speed: 6
                });
                spawnParticle(player.x, player.y - 25, 0, -2, '#ff4400', 10);
                playSound('rocket');
                difficultyDirector.recordShot();
            }
            return;
        } else if (player.weapon === 'laser') {
            player.fireCD = 8;
            bullets.push({ x: player.x, y: player.y - 25, vx: 0, vy: -BULLET_SPEED * 2, type: 'laser', life: 60 });
            spawnParticle(player.x, player.y - 25, 0, 0, '#00ffff', 12);
            playSound('laser');
            difficultyDirector.recordShot();
        } else if (player.weapon === 'emp') {
            player.fireCD = 60;
            playSound('emp');
            // Kill all helicopters
            enemies.forEach(e => {
                spawnExplosion(e.x, e.y);
                score += 20 + combo * 5;
                combo++;
                comboTimer = 90;
            });
            enemies = [];
            // EMP visual effect
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 300;
                spawnParticle(W/2 + Math.cos(angle) * dist, H/2 + Math.sin(angle) * dist, 0, 0, '#00ffff', 15);
            }
            player.weapon = 'default';
            return;
        } else {
            // Default weapon - triple shot
            player.fireCD = 10;
            [-4, 0, 4].forEach(ox => {
                bullets.push({ x: player.x + ox, y: player.y - 25, vx: ox * 0.1, vy: -BULLET_SPEED });
            });
            playSound('shoot');
            difficultyDirector.recordShot();
        }
        
        // Muzzle flash
        for (let i = 0; i < 4; i++) {
            spawnParticle(player.x, player.y - 28, (Math.random() - 0.5) * 4, -Math.random() * 4, '#ffaa00', 8);
        }
    }
    
    function autoTurrets() {
        const turrets = [{ x: W * 0.3, y: H * 0.52 }, { x: W * 0.7, y: H * 0.52 }];
        
        turrets.forEach((t, idx) => {
            // Only fire one bullet at a time, and less frequently
            if (Math.random() < 0.015) { // Reduced from 0.06 to 0.015
                let nearest = null, nearestDist = 400;
                enemies.forEach(e => {
                    const d = Math.hypot(e.x - t.x, e.y - t.y);
                    if (d < nearestDist) { nearestDist = d; nearest = e; }
                });
                
                if (nearest) {
                    const angle = Math.atan2(nearest.y - t.y, nearest.x - t.x);
                    turretBullets.push({
                        x: t.x, y: t.y,
                        vx: Math.cos(angle) * TURRET_BULLET_SPEED,
                        vy: Math.sin(angle) * TURRET_BULLET_SPEED
                    });
                    spawnParticle(t.x, t.y, 0, 0, '#ffff00', 10);
                    playSound('turret');
                }
            }
        });
    }
    
    function spawnParticle(x, y, vx, vy, color, size) {
        particles.push({ x, y, vx, vy, color, size, life: 25, _maxLife: 25 });
    }
    
    function spawnExplosion(x, y) {
        playSound('explosion');
        for (let i = 0; i < 18; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 6;
            const col = Math.random() > 0.5 ? '#ff4400' : '#ffcc00';
            spawnParticle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, col, 4 + Math.random() * 5);
        }
    }
    
    function spawnWeaponDrop(x, y) {
        const roll = Math.random() * 100;
        let type = null;
        
        if (roll < 50) {
            type = 'ak47'; // 50%
        } else if (roll < 85) {
            type = 'rocket'; // 35%
        } else if (roll < 95) {
            type = 'laser'; // 10%
        } else {
            type = 'emp'; // 5%
        }
        
        if (type) {
            weaponPickups.push({
                x, y, type,
                timer: 600 // 10 seconds at 60fps
            });
            // Sparkly effect
            for (let i = 0; i < 10; i++) {
                spawnParticle(x, y, (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4, '#ffffff', 6);
            }
            playSound('pickup');
        }
    }
    
    function triggerSharkAttack() {
        const shipCX = W / 2, shipCY = H * 0.54;
        let nearest = null, nearestDist = 350;
        
        sharks.forEach(s => {
            const d = Math.hypot(s.x - shipCX, s.baseY - shipCY);
            if (d < nearestDist) { nearestDist = d; nearest = s; }
        });
        
        if (nearest && nearestDist < 300) {
            nearest.attacking = true;
            nearest.attackTimer = 35;
            shipRock.vel += (Math.random() - 0.5) * 0.05;
        }
    }
    
    function startGame() {
        gameState = 'playing';
        score = 0; combo = 0; comboTimer = 0; difficulty = 1; gameTime = 0; scrollY = 0;
        shipRock = { angle: 0, vel: 0 }; screenShake = 0;
        difficultyDirector.reset();
        
        player.x = W / 2;
        player.y = H * 0.68;
        player.health = 3; player.invincible = 0; player.fireCD = 0;
        player.weapon = 'default'; player.weaponTimer = 0; player.rockets = 0;
        
        bullets = []; enemyBullets = []; turretBullets = []; rockets = [];
        enemies = []; particles = []; weaponPickups = [];
        
        rocks = [];
        for (let i = 0; i < 5; i++) {
            rocks.push({
                x: 50 + Math.random() * (W - 100),
                y: -200 - i * 400 - Math.random() * 200,
                baseY: -200 - i * 400 - Math.random() * 200,
                size: 28 + Math.random() * 35
            });
        }
        
        sharks = [];
        for (let i = 0; i < 4; i++) {
            sharks.push({
                x: 30 + Math.random() * (W - 60),
                y: -100 - i * 300 - Math.random() * 150,
                baseY: -100 - i * 300 - Math.random() * 150,
                vx: (Math.random() - 0.5) * 2.5,
                direction: Math.random() > 0.5 ? 1 : -1,
                attacking: false, attackTimer: 0
            });
        }
        
        const dw = W * 0.65, dh = H * 0.42;
        const dx = (W - dw) / 2, dy = H * 0.34;
        containers = [
            { x: dx + 18, y: dy + 8, w: 58, h: 38 },
            { x: dx + 86, y: dy + 8, w: 68, h: 38 },
            { x: dx + 164, y: dy + 8, w: 52, h: 38 },
            { x: dx + 226, y: dy + 8, w: 62, h: 38 },
            { x: dx + 8, y: dy + 54, w: 78, h: 42 },
            { x: dx + 96, y: dy + 54, w: 48, h: 42 },
            { x: dx + 154, y: dy + 54, w: 72, h: 42 },
            { x: dx + 236, y: dy + 54, w: 58, h: 42 },
            { x: dx + 28, y: dy + 104, w: 62, h: 38 },
            { x: dx + 100, y: dy + 104, w: 68, h: 38 },
            { x: dx + 178, y: dy + 104, w: 58, h: 38 },
            { x: dx + 12, y: dy + 150, w: 72, h: 44 },
            { x: dx + 94, y: dy + 150, w: 52, h: 44 },
            { x: dx + 156, y: dy + 150, w: 78, h: 44 },
            { x: dx + 244, y: dy + 150, w: 48, h: 44 }
        ];
    }
    
    function endGame() {
        gameState = 'gameover';
        playSound('gameover');
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('shipShooterHS', highScore);
        }
        // Save to leaderboard
        saveScoreToLeaderboard(playerName, score, Date.now());
    }
    
    function update() {
        if (gameState !== 'playing') return;
        
        gameTime++;
        difficulty = 1 + Math.floor(gameTime / 900) * 0.25;
        scrollY += SHIP_SPEED;
        
        // Use adaptive difficulty director for spawning
        if (gameTime % difficultyDirector.spawnInterval === 0) {
            for (let i = 0; i < difficultyDirector.enemyDensity; i++) {
                spawnHelicopter();
            }
        }
        if (gameTime % 320 === 0 && Math.random() < 0.5) triggerSharkAttack();
        
        if (comboTimer > 0) { comboTimer--; if (comboTimer === 0) combo = 0; }
        
        shipRock.vel += (0 - shipRock.angle) * 0.015;
        shipRock.vel *= ROCK_DAMP;
        shipRock.angle += shipRock.vel;
        shipRock.angle = Math.max(-MAX_ROCK, Math.min(MAX_ROCK, shipRock.angle));
        
        if (keys['a'] || keys['arrowleft']) player.x -= PLAYER_SPEED;
        if (keys['d'] || keys['arrowright']) player.x += PLAYER_SPEED;
        if (keys['w'] || keys['arrowup']) player.y -= PLAYER_SPEED;
        if (keys['s'] || keys['arrowdown']) player.y += PLAYER_SPEED;
        
        player.x = Math.max(40, Math.min(W - 40, player.x));
        player.y = Math.max(H * 0.28, Math.min(H * 0.82, player.y));
        
        if (keys[' ']) shoot();
        if (player.fireCD > 0) player.fireCD--;
        
        autoTurrets();
        
        containers.forEach(c => {
            if (player.x > c.x && player.x < c.x + c.w && player.y > c.y && player.y < c.y + c.h) {
                const dx = player.x - (c.x + c.w / 2);
                const dy = player.y - (c.y + c.h / 2);
                if (Math.abs(dx) > Math.abs(dy)) player.x += dx > 0 ? 3 : -3;
                else player.y += dy > 0 ? 3 : -3;
            }
        });
        
        bullets = bullets.filter(b => {
            b.x += b.vx; b.y += b.vy;
            for (let c of containers) {
                if (b.x > c.x && b.x < c.x + c.w && b.y > c.y && b.y < c.y + c.h) return false;
            }
            return b.y > -20;
        });
        
        turretBullets = turretBullets.filter(b => {
            b.x += b.vx; b.y += b.vy;
            return b.x > -15 && b.x < W + 15 && b.y > -15 && b.y < H + 15;
        });
        
        enemyBullets = enemyBullets.filter(b => {
            b.x += b.vx; b.y += b.vy;
            
            if (player.invincible <= 0 && Math.abs(b.x - player.x) < 18 && Math.abs(b.y - player.y) < 24) {
                player.health--;
                player.invincible = 90;
                screenShake = 12;
                playSound('hit');
                difficultyDirector.recordDamage(1);
                if (player.health <= 0) endGame();
                return false;
            }
            
            for (let c of containers) {
                if (b.x > c.x && b.x < c.x + c.w && b.y > c.y && b.y < c.y + c.h) return false;
            }
            
            return b.x > -20 && b.x < W + 20 && b.y > -20 && b.y < H + 20;
        });
        
        enemies = enemies.filter(e => {
            e.x += e.vx; e.y += e.vy;
            e.fireTimer--;
            
            if (e.fireTimer <= 0) {
                const angle = Math.atan2(player.y - e.y, player.x - e.x);
                enemyBullets.push({
                    x: e.x, y: e.y + 15,
                    vx: Math.cos(angle) * ENEMY_BULLET_SPEED * 0.7,
                    vy: Math.sin(angle) * ENEMY_BULLET_SPEED * 0.7
                });
                e.fireTimer = 55;
            }
            
            for (let i = turretBullets.length - 1; i >= 0; i--) {
                const b = turretBullets[i];
                if (Math.abs(b.x - e.x) < 28 && Math.abs(b.y - e.y) < 22) {
                    turretBullets.splice(i, 1);
                    e.health--;
                    difficultyDirector.recordHit();
                    spawnParticle(e.x, e.y, 0, 0, '#ff8800', 6);
                    if (e.health <= 0) {
                        spawnExplosion(e.x, e.y);
                        spawnWeaponDrop(e.x, e.y);
                        score += 15 + combo * 5;
                        difficultyDirector.recordScore(15 + combo * 5);
                        difficultyDirector.recordKill();
                        combo++;
                        comboTimer = 90;
                        shipRock.vel += (Math.random() - 0.5) * 0.015;
                        return false;
                    }
                }
            }
            
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                if (Math.abs(b.x - e.x) < 28 && Math.abs(b.y - e.y) < 22) {
                    bullets.splice(i, 1);
                    e.health--;
                    difficultyDirector.recordHit();
                    spawnParticle(e.x, e.y, 0, 0, '#ff8800', 6);
                    if (e.health <= 0) {
                        spawnExplosion(e.x, e.y);
                        spawnWeaponDrop(e.x, e.y);
                        score += 15 + combo * 5;
                        difficultyDirector.recordScore(15 + combo * 5);
                        difficultyDirector.recordKill();
                        combo++;
                        comboTimer = 90;
                        shipRock.vel += (Math.random() - 0.5) * 0.015;
                        return false;
                    }
                }
            }
            
            return e.x > -60 && e.x < W + 60 && e.y < H + 80;
        });
        
        rocks.forEach(r => {
            r.y = r.baseY + scrollY;
            if (r.y > H + 120) {
                r.baseY -= 1800 + Math.random() * 500;
                r.y = r.baseY + scrollY;
                r.x = 50 + Math.random() * (W - 100);
            }
        });
        
        sharks.forEach(s => {
            s.y = s.baseY + scrollY;
            
            if (s.attacking) {
                s.x += s.vx * 2.5;
                s.attackTimer--;
                if (s.attackTimer <= 0) s.attacking = false;
                if (Math.random() < 0.25) shipRock.vel += (Math.random() - 0.5) * 0.025;
            } else {
                s.x += s.vx;
                if (s.x < 40 || s.x > W - 40) { s.vx *= -1; s.direction *= -1; }
            }
            
            if (s.y > H + 120) {
                s.baseY -= 1300 + Math.random() * 400;
                s.y = s.baseY + scrollY;
                s.x = 50 + Math.random() * (W - 100);
            }
        });
        
        particles = particles.filter(p => {
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.12;
            p.life--;
            return p.life > 0;
        });
        
        // Update rockets (homing)
        rockets = rockets.filter(r => {
            if (r.target && enemies.includes(r.target)) {
                const dx = r.target.x - r.x;
                const dy = r.target.y - r.y;
                const dist = Math.hypot(dx, dy);
                if (dist > 0) {
                    r.x += (dx / dist) * r.speed;
                    r.y += (dy / dist) * r.speed;
                }
                // Trail particles
                if (Math.random() < 0.3) {
                    spawnParticle(r.x, r.y + 8, (Math.random() - 0.5) * 2, Math.random() * 2, '#ff8800', 4);
                }
                // Check collision with target
                if (dist < 20) {
                    spawnExplosion(r.target.x, r.target.y);
                    spawnWeaponDrop(r.target.x, r.target.y);
                    score += 20 + combo * 5;
                    combo++;
                    comboTimer = 90;
                    enemies = enemies.filter(e => e !== r.target);
                    return false;
                }
            } else {
                r.y -= r.speed;
            }
            return r.y > -20;
        });
        
        // Update weapon pickups
        weaponPickups = weaponPickups.filter(w => {
            w.timer--;
            w.y += 0.5; // Float down slightly
            
            // Check collision with player
            const dist = Math.hypot(player.x - w.x, player.y - w.y);
            if (dist < 30) {
                // Pickup!
                if (w.type === 'ak47') {
                    player.weapon = 'ak47';
                    player.weaponTimer = 0; // Permanent until death
                } else if (w.type === 'rocket') {
                    player.weapon = 'rocket';
                    player.rockets = 6;
                } else if (w.type === 'laser') {
                    player.weapon = 'laser';
                    player.weaponTimer = 30 * 60; // 30 seconds
                } else if (w.type === 'emp') {
                    player.weapon = 'emp';
                }
                // Pickup effect
                for (let i = 0; i < 15; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    spawnParticle(w.x, w.y, Math.cos(angle) * 4, Math.sin(angle) * 4, '#ffffff', 8);
                }
                return false;
            }
            
            return w.timer > 0;
        });
        
        // Update laser weapon timer
        if (player.weapon === 'laser') {
            player.weaponTimer--;
            if (player.weaponTimer <= 0) {
                player.weapon = 'default';
            }
        }
        
        if (player.invincible > 0) player.invincible--;
    }
    
    function gameLoop() {
        ctx.clearRect(0, 0, W, H);
        
        if (gameState === 'title') {
            drawBackground();
            drawTitleScreen();
            scrollY += SHIP_SPEED * 0.5;
        } else if (gameState === 'leaderboard') {
            drawLeaderboardScreen();
        } else if (gameState === 'playing') {
            drawBackground();
            drawRocks();
            drawSharks();
            drawShip();
            drawContainers();
            drawTurrets();
            drawPlayer();
            drawHelicopters();
            drawBullets();
            drawWeaponPickups();
            drawParticles();
            drawUI();
            update();
            difficultyDirector.update();
        } else if (gameState === 'gameover') {
            drawBackground();
            drawRocks();
            drawSharks();
            drawShip();
            drawContainers();
            drawTurrets();
            drawPlayer();
            drawHelicopters();
            drawBullets();
            drawParticles();
            drawUI();
            drawGameOverScreen();
        }
        
        if (screenShake > 0) {
            ctx.save();
            ctx.translate(
                (Math.random() - 0.5) * screenShake,
                (Math.random() - 0.5) * screenShake
            );
            screenShake *= 0.88;
            if (screenShake < 0.5) {
                screenShake = 0;
                ctx.restore();
            }
        }
        
        requestAnimationFrame(gameLoop);
    }
    
    // Start
    gameLoop();
})();
</script>
